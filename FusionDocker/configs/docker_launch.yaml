docker_launcher:
  docker_model_root: ${DOCKER_MODEL_ROOT}
  # ── Single switch for the whole camera pipeline (single | multi) ──────────
  # Changing this ONE line is enough: the launcher injects it as
  # $TJFUSION_MODE into every docker target (RealSense/SigLIP read it), and
  # auto-enables the bridge tagged with the same camera_mode below. The `mode:`
  # field in each docker's config.yaml is now only a standalone-run fallback.
  camera_mode: multi
  tmux: true
  monitor: true
  replace_session: true
  poll_interval: 0.5
  dashboard:
    mode: web
    host: 0.0.0.0
    port: 8765
    log_lines: 300
  bridges:
  # The two RealSense bridges are tagged with camera_mode; the launcher enables
  # whichever matches the top-level camera_mode and disables the other. The
  # `enabled` flags below are just defaults for when camera_mode is unset.
  - name: RealSense Split Pipeline (Multi)
    camera_mode: multi
    enabled: true
    config: configs/bridge.realsense_split_multi.yaml
  - name: RealSense Split Pipeline
    camera_mode: single
    enabled: false
    config: configs/bridge.realsense_split.yaml
  zmq_test:
    timeout_ms: 4000
    history_limit: 40
    endpoints:
      Sam3Docker: tcp://127.0.0.1:5562
      YOLODocker: tcp://127.0.0.1:5555
      SiglipDocker: tcp://127.0.0.1:7777
      FlowPoseDocker: tcp://127.0.0.1:6667
  docker_targets:
  - name: RealSenseDocker
    group: camera
    location: local
    enabled: true
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: Fast-FoundationSteroDocker
    group: vision
    location: local
    enabled: true
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: Sam3Docker
    group: vision
    location: local
    enabled: true
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: YOLODocker
    group: vision
    location: local
    enabled: false
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: FlowPoseDocker
    group: vision
    location: local
    enabled: true
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: SiglipDocker
    group: inference
    location: local
    enabled: true
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: MarvinDocker
    group: action
    location: local
    enabled: false
    docker_model_root: ${DOCKER_MODEL_ROOT}
  - name: VlmDocker
    group: inference
    location: local
    enabled: false
    docker_model_root: ${DOCKER_MODEL_ROOT}
