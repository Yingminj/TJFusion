object_type: drawer
display_name: Drawer
template_key: drawer_handle
aliases:
  - drawer_handle

attributes:
  category: storage
  affordances:
    - open
    - close
    - place

states:
  default: closed
  aliases:
    closed:
      - closed
      - shut
    open:
      - open
      - opened
    occupied:
      - occupied
      - contains_object

action_rules:
  - when:
      current_state: closed
      goal: open
    action: open
  - when:
      current_state: open
      goal: close
    action: close
  - when:
      current_state: open
      goal: place
    action: place
