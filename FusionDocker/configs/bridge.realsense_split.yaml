bridge:
  type: custom_pipeline

  # ── 数据源 ────────────────────────────────────────────────────────────────
  # 新拆分后，RealSenseDocker 用 PUB 持续推标准协议消息（color/ir_left/ir_right
  # [+hw_depth] + 相机参数）。bridge 作为 SUB 连上它，并把 arrays/fields 直接
  # seed 进共享 store（无 base64）。
  source_mode: protocol
  zmq_source_addr: tcp://127.0.0.1:5551     # RealSenseDocker 的 --pub-bind

  # 结果发布给 MarvinDocker（动作模块）
  result_pub_addr: tcp://0.0.0.0:8899
  result_tf_topic: /fusion/pose
  result_siglip_topic: /fusion/status

  # ── 可视化 ────────────────────────────────────────────────────────────────
  # 用 OpenCV 把各节点结果统一显示在一个窗口里（每个 docker 一个面板）：
  #   RealSense(color+IR) · Fast-Foundation(depth) · SAM3(mask) ·
  #   VLM(status) · SigLIP(status) · FlowPose(pose)。
  # 需要带 GUI 的 OpenCV（pip install opencv-python，而非 headless），并设置好
  # DISPLAY；无显示环境会自动退化为把合成帧写到 visualize_save_path。
  visualize: true
  visualize_window: TJFusion Pipeline
  visualize_scale: 1.0
  visualize_save_path: ""        # 无显示时合成帧落盘路径（留空则 /tmp/tjfusion_pipeline.jpg）

  prompts:
    - cup
    - red box

  # 想最终从 bridge 拿到哪些字段（来自各节点的 response_map / outputs）
  pipeline_outputs:
    - depth                 # 来自 fast_foundation 节点
    - combined_mask         # 来自 sam3
    - obj_ids
    - class_names
    - best_category         # 来自 vlm
    - best_similarity
    - state_id
    - state_name
    - objects               # 来自 flowpose（位姿/尺寸单位为米）

  # ── 流水线（顺序 = depends_on 拓扑；同层并行）────────────────────────────────
  pipeline:
    # [1] 立体深度：Fast-Foundation 现在是纯 depth 估计器，吃 ir_left/ir_right
    - name: fast_foundation
      kind: generic
      data_type: depth                       # ← Phase 2 会用它做自动 schema 校验
      endpoint: tcp://127.0.0.1:4444         # ffs-depth 的 --bind
      timeout_ms: 5000
      role: required
      inputs:
        - ir_left
        - ir_right
        - ir_left_intrinsics
        - baseline_m
      request_map:
        left: $ir_left
        right: $ir_right
        ir_left_intrinsics: $ir_left_intrinsics   # 左红外相机内参：视差→深度
        baseline_m: $baseline_m
        color_intrinsics: $color_intrinsics        # 彩色相机内参：深度对齐到彩色帧
        ir_to_color_rotation: $ir_to_color_rotation
        ir_to_color_translation: $ir_to_color_translation
      response_map:
        depth: depth                         # 把响应里的 depth 写回共享 store

    # [2] 分割：SAM3，只要 color（与 depth 并行，互不依赖）
    - name: sam3
      kind: generic
      data_type: mask
      endpoint: tcp://127.0.0.1:5562
      timeout_ms: 5000
      role: required
      inputs:
        - color
        - prompts
      request_map:
        color: $color
        prompts: $prompts
        return_masks:
          value: true
      response_map:
        combined_mask: combined_mask
        obj_ids: obj_ids
        class_names: class_names

    # [3] 状态分类：VLM（Qwen3.5-VL + gift_v1），只要 color（也与上面并行）
    #     服务器内部维护滚动帧缓冲，每次请求送当前 color 帧；生成较慢，timeout 调大。
    - name: vlm
      kind: generic
      data_type: status
      endpoint: tcp://127.0.0.1:7788
      timeout_ms: 30000
      role: required
      inputs:
        - color
      request_map:
        color: $color
      response_map:
        best_category: best_category
        best_similarity: best_similarity
        state_id: state_id
        name: state_name

    # [4] 位姿：FlowPose，依赖 depth(来自[1]) + mask(来自[2])
    - name: flowpose
      kind: generic
      data_type: pose
      endpoint: tcp://127.0.0.1:6667
      timeout_ms: 5000
      depends_on:
        - fast_foundation
        - sam3
      role: required
      inputs:
        - color
        - depth
        - combined_mask
        - obj_ids
        - color_intrinsics
      request_map:
        color: $color
        depth: $depth
        combined_mask: $combined_mask
        obj_ids: $obj_ids
        class_names: $class_names
        color_intrinsics: $color_intrinsics   # 深度已对齐到彩色帧，位姿用彩色相机内参估计/可视化
      response_map:
        objects: objects
